<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Kanban Board</h1>
            <p>Drag & Drop Task Management with Persistent Storage</p>
        </div>

        <div class="board" id="board"></div>
    </div>

    <div class="modal" id="cardModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">Add New Task</div>
            <form id="cardForm" onsubmit="saveCard(event)">
                <div class="form-group">
                    <label for="cardText">Task Description</label>
                    <textarea id="cardText" placeholder="Enter task details..." required></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script type ="module" src="app.js"></script>
</body>
</html>
